<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Ladder</title>

<style>
body {font-family: Arial; background:#f5f5f5; text-align:center;}
.container {max-width:900px; margin:auto; padding:20px;}

.row {display:flex; border:2px solid #888; border-bottom:none;}
.row:last-child {border-bottom:2px solid #888;}

.word {width:200px; padding:18px; font-size:24px; border-right:2px solid #888; background:#fff;}
.clue {flex:1; padding:18px; text-align:left;}

.active {background:#e6f0ee;}

input {font-size:20px; width:120px; text-align:center;}

button {padding:10px 15px; margin:10px 5px; font-size:16px;}
</style>
</head>

<body>
<div class="container">

<h2 id="goal"></h2>

<div id="game"></div>

<button onclick="submitWord()">ENTER</button>
<button onclick="clearInput()">⌫</button>
<button onclick="playAgain()">Play Again</button>

<div id="message"></div>

</div>

<script>

/* =========================
30 PUZZLES
========================= */

const puzzles = [

{start:"LOVE",end:"CASH",answers:["LOSE","LOST","COST","CAST","CASE"],clues:["Fail to keep","No longer found","Price","Actors","Container"]},

{start:"MAIN",end:"MEAL",answers:["MAIL","MALL","HALL","HELL","HEAL"],clues:["Letters","Shopping center","Entryway","Underworld","Make better"]},

{start:"HOME",end:"WAVE",answers:["COME","CAME","CANE","CAVE"],clues:["Move toward","Past of come","Walking stick","Rock opening"]},

{start:"TREE",end:"LEAF",answers:["FREE","FLEE","FLEA","PLEA","LEAD"],clues:["No cost","Run away","Insect","Beg","Metal"]},

{start:"BOOK",end:"PAGE",answers:["LOOK","LOCK","LACK","PACK","PACE"],clues:["See","Door fastener","Missing","Bundle","Speed"]},

{start:"COLD",end:"HEAT",answers:["CORD","CARD","HARD","HEAD","HEAT"],clues:["String","Playing card","Not soft","Top","Warmth"]},

{start:"MOON",end:"STAR",answers:["SOON","SOAR","SCAR","STAR"],clues:["Soon","Fly","Mark","Night light"]},

{start:"MIND",end:"BODY",answers:["BIND","BAND","BOND","BONY","BODY"],clues:["Tie","Group","Connection","Thin","Physical form"]},

{start:"HAND",end:"FOOD",answers:["HARD","WARD","WORD","WOOD","FOOD"],clues:["Not soft","Hospital area","Speech unit","Tree","Eat"]},

{start:"FIRE",end:"ROOM",answers:["FIRM","FORM","FOAM","ROAM"],clues:["Solid","Shape","Bubbles","Wander"]},

{start:"SALT",end:"WINE",answers:["SALE","PALE","PILE","PINE"],clues:["Discount","Light color","Stack","Tree"]},

{start:"HEAD",end:"TAIL",answers:["HEAL","TEAL","TELL","TALL"],clues:["Fix","Color","Speak","High"]},

{start:"ROAD",end:"BEAR",answers:["GOAD","GOAT","BOAT","BEAT"],clues:["Prod","Animal","Water","Rhythm"]},

{start:"SHIP",end:"DOCK",answers:["SHOP","STOP","STEP","DEEP","DECK"],clues:["Store","Halt","Foot","Far down","Boat floor"]},

{start:"BACK",end:"BOOK",answers:["LACK","LOCK","LOOK","BOOK"],clues:["Missing","Fastener","See","Read"]},

{start:"CAMP",end:"FATE",answers:["DAMP","DAME","GAME","GATE"],clues:["Wet","Lady","Play","Door"]},

{start:"FISH",end:"BIRD",answers:["DISH","DASH","DARK","BARK"],clues:["Plate","Run","No light","Dog sound"]},

{start:"WOOD",end:"BLOW",answers:["FOOD","FOOT","BOOT","BLOT"],clues:["Eat","Walk","Shoe","Ink mark"]},

{start:"CAME",end:"MORE",answers:["CARE","CORE"],clues:["Help","Center"]},

{start:"BARE",end:"MIND",answers:["BANE","BAND","BIND"],clues:["Curse","Group","Tie"]},

{start:"PALE",end:"WINE",answers:["PILE","PINE"],clues:["Stack","Tree"]},

{start:"HAVE",end:"MIND",answers:["CAVE","CANE","BANE","BAND","BIND"],clues:["Rock opening","Stick","Curse","Group","Tie"]},

{start:"COLD",end:"WARM",answers:["CORD","CARD","WARD","WORD","WORM"],clues:["String","Card","Area","Speech","Creature"]},

{start:"GOLD",end:"CARE",answers:["COLD","CORD","CARD","CARE"],clues:["Not warm","String","Card","Help"]},

{start:"TIME",end:"TIDE",answers:["TILE","PILE","PINE","TINE"],clues:["Floor","Stack","Tree","Fork prong"]},

{start:"RING",end:"BELL",answers:["SING","SANG","BANG","BANE","BELL"],clues:["Song","Past sing","Loud hit","Curse","Sound"]},

{start:"BLUE",end:"PINK",answers:["CLUE","CLUB","CUB","CUP","PUP"],clues:["Hint","Group","Bear baby","Drink","Dog baby"]},

{start:"DARK",end:"BIKE",answers:["LARK","LACK","LICK","LIKE","BIKE"],clues:["Bird","Missing","Taste","Enjoy","Ride"]},

{start:"CORN",end:"READ",answers:["BORN","BARN","BARD","BEAD","READ"],clues:["Arrived","Farm","Poet","Drop","Read"]},

{start:"SLOW",end:"FAST",answers:["FLOW","FLEW","FLAW","FLAT","FAST"],clues:["Move","Flew","Mistake","Level","Quick"]}

];

/* =========================
DAILY ROTATION
========================= */

const startDate = new Date("2026-04-01");
const today = new Date();
const diff = today - startDate;
const dayIndex = Math.floor(diff / (1000 * 60 * 60 * 24));

let index = dayIndex % puzzles.length;
let puzzle = puzzles[index];

/* =========================
STATE
========================= */

let currentStep = 0;
let userAnswers = [];

/* =========================
BUILD GAME
========================= */

function buildGame(){

const game = document.getElementById("game");
game.innerHTML = "";

game.appendChild(makeRow(puzzle.start,""));

for(let i=0;i<puzzle.answers.length;i++){

let word = "";

if(i < userAnswers.length){
    word = userAnswers[i];
}
else if(i === userAnswers.length){
    word = `<input id="input" maxlength="${puzzle.start.length}" autofocus>`;
}
else{
    word = "----";
}

game.appendChild(makeRow(word,puzzle.clues[i],i===userAnswers.length));
}

game.appendChild(makeRow(puzzle.end,""));

}

/* =========================
ROW
========================= */

function makeRow(word,clue,active=false){

const row=document.createElement("div");
row.className="row";

const w=document.createElement("div");
w.className="word";
if(active) w.classList.add("active");

if(word.includes("<input")) w.innerHTML=word;
else w.textContent=word;

const c=document.createElement("div");
c.className="clue";
c.textContent=clue;

row.appendChild(w);
row.appendChild(c);

return row;
}

/* =========================
SUBMIT
========================= */

function submitWord(){

const input=document.getElementById("input");
if(!input) return;

const value=input.value.toUpperCase().trim();
const correct=puzzle.answers[currentStep];

if(value===correct){
    userAnswers.push(value);
    currentStep++;
    buildGame();
}
else{
    document.getElementById("message").textContent=
    "That fits a different clue. Try this row first.";
}

}

/* ========================= */

function clearInput(){
const i=document.getElementById("input");
if(i) i.value="";
}

function playAgain(){
index=Math.floor(Math.random()*puzzles.length);
puzzle=puzzles[index];
currentStep=0;
userAnswers=[];
buildGame();
}

document.getElementById("goal").textContent =
`${puzzle.start} → ${puzzle.end}`;

buildGame();

</script>
</body>
</html>
