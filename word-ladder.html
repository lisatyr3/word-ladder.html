<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Ladder Challenge</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f3f4f4;
margin:0;
padding:16px;
}

.wrap{
max-width:1100px;
margin:auto;
background:#fff;
border-radius:22px;
padding:26px;
box-shadow:0 3px 14px rgba(0,0,0,.08);
}

h1{
text-align:center;
color:#2d8a78;
font-size:48px;
margin:0 0 10px;
}

.goal{
text-align:center;
font-size:34px;
font-weight:bold;
margin-bottom:10px;
}

.instructions{
text-align:center;
color:#666;
font-size:20px;
margin-bottom:30px;
}

.game{
display:grid;
grid-template-columns:360px 1fr;
gap:50px;
}

.ladder{
border-left:8px solid #777;
border-right:8px solid #777;
}

.rung{
min-height:85px;
border-top:8px solid #777;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:500;
}

.rung:last-child{
border-bottom:8px solid #777;
}

.active{
background:#dfe7e4;
}

.placeholder{
letter-spacing:4px;
}

input{
font-size:28px;
text-align:center;
width:140px;
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

.clueSpacer{
min-height:85px;
}

.clue{
min-height:85px;
display:flex;
align-items:center;
border-top:1px solid #eee;
font-size:22px;
}

.clue.active{
font-weight:bold;
color:#2d8a78;
}

.keyboard{
margin-top:30px;
display:flex;
flex-direction:column;
gap:10px;
align-items:center;
}

.keyrow{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
}

.key{
border:none;
border-radius:10px;
background:#d9d9dd;
min-width:55px;
height:55px;
font-size:20px;
cursor:pointer;
}

.key.wide{
min-width:120px;
}

.message{
text-align:center;
font-size:26px;
font-weight:bold;
margin-top:15px;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Word Ladder Challenge</h1>

<div class="goal" id="goal"></div>

<div class="instructions">
Start with the top word and work down.  
Each answer changes <b>one letter</b> and matches the clue.
</div>

<div class="game">

<div class="ladder" id="ladder"></div>

<div>
<div class="clueSpacer"></div>
<div id="clues"></div>
</div>

</div>

<div class="keyboard" id="keyboard"></div>

<div class="message" id="message"></div>

</div>

<script>

/* 28 DAILY PUZZLES */

const puzzles = [

{start:"MAIN",end:"MEAL",answers:["MAIL","MALL","HALL","HELL","HEAL"],clues:["Postal system","Shopping center","Entryway","Underworld","Cure"]},

{start:"COLD",end:"WARM",answers:["CORD","CARD","WARD","WORD","WORM"],clues:["Rope","Playing card","Hospital unit","Spoken unit","Wiggly creature"]},

{start:"FALL",end:"RISE",answers:["FAIL","MAIL","MILE","MIRE","SIRE"],clues:["Not succeed","Letters delivered","Distance measure","Swampy ground","Respected father"]},

{start:"SAND",end:"ROCK",answers:["SEND","SEED","SEEK","SOCK","ROCK"],clues:["Mail something","Plant starter","Look for","Foot clothing","Stone"]},

{start:"WIND",end:"CALM",answers:["WINE","LINE","LIME","LAME","CAME"],clues:["Grape drink","Straight mark","Green citrus","Not strong","Past of come"]},

{start:"TIME",end:"TIDE",answers:["TILE","PILE","PINE","TINE","TIDE"],clues:["Floor piece","Stack","Evergreen tree","Fork prong","Ocean level"]},

{start:"FIRE",end:"SNOW",answers:["FIRM","FORM","FOAM","ROAM","ROOM"],clues:["Solid","Shape","Bubbles","Wander","Enclosed space"]},

{start:"SHIP",end:"BOAT",answers:["SHOP","SHOT","SOOT","BOOT","BOAT"],clues:["Store","Gun discharge","Black residue","Footwear","Small vessel"]},

{start:"HOME",end:"AWAY",answers:["COME","CAME","CANE","CAVE","WAVE"],clues:["Arrive","Past of come","Walking stick","Hollow rock","Ocean motion"]},

{start:"TREE",end:"LEAF",answers:["FREE","FLEE","FLEA","PLEA","LEAD"],clues:["No cost","Run away","Jumping insect","Beg strongly","Metal"]},

{start:"FISH",end:"BIRD",answers:["DISH","DASH","DARK","BARK","BIRD"],clues:["Plate","Run quickly","No light","Dog sound","Flying animal"]},

{start:"KING",end:"PAWN",answers:["KIND","BIND","BAND","BANE","PANE"],clues:["Type","Tie up","Music group","Cause of ruin","Window glass"]},

{start:"ROAD",end:"PATH",answers:["ROAM","FOAM","FORM","FARM","HARM"],clues:["Wander","Bubbles","Shape","Country land","Injury"]},

{start:"GOLD",end:"SILK",answers:["GOLF","WOLF","WILT","SILT","SILK"],clues:["Sport","Wild dog","Fade","River sediment","Fine fabric"]},

{start:"STAR",end:"MOON",answers:["STIR","STIR","STOR","STOP","SHOP"],clues:["Mix","Move liquid","Old word store","Halt","Retail place"]},

{start:"FARM",end:"CITY",answers:["FORM","FROM","FROG","FRAG","FLAG"],clues:["Shape","Origin word","Green jumper","Explosion piece","Banner"]},

{start:"LION",end:"BEAR",answers:["LOIN","COIN","JOIN","JOAN","BEAN"],clues:["Cut of meat","Money piece","Become part of","Female name","Vegetable seed"]},

{start:"SALT",end:"SWEET",answers:["SALE","PALE","PILE","PINE","WINE"],clues:["Store event","Light color","Stack","Evergreen tree","Grape drink"]},

{start:"SHIP",end:"PORT",answers:["SHOP","STOP","STEP","SEEP","KEEP"],clues:["Store","Halt","Foot move","Leak slowly","Hold onto"]},

{start:"FISH",end:"CRAB",answers:["DISH","DASH","CASH","CASE","BASE"],clues:["Plate","Run quickly","Money","Container","Bottom"]},

{start:"CAMP",end:"FIRE",answers:["DAMP","DAME","GAME","GATE","FATE"],clues:["Slightly wet","Lady","Contest","Fence opening","Destiny"]},

{start:"SNOW",end:"RAIN",answers:["SLOW","SLOW","FLOW","FROW","FROM"],clues:["Not fast","Lazy","Move like water","Old word woman","Origin word"]},

{start:"HILL",end:"LAKE",answers:["HILT","MILT","MILE","PILE","PIKE"],clues:["Sword handle","Fish sperm","Distance","Stack","Fish"]},

{start:"WARM",end:"COOL",answers:["WORM","WORD","WOOD","GOOD","GOOL"],clues:["Wiggly creature","Speech unit","Tree material","Opposite bad","Almost cool"]},

{start:"LAMP",end:"MOON",answers:["LIMP","LIME","LINE","LONE","MOLE"],clues:["Walk unevenly","Green citrus","Straight mark","Single","Burrowing animal"]},

{start:"FIRE",end:"COLD",answers:["FIRM","FORM","FOAM","ROAM","ROAD"],clues:["Solid","Shape","Bubbles","Wander","Street"]},

{start:"KING",end:"QUEEN",answers:["KIND","MIND","MINE","NINE","NONE"],clues:["Type","Brain","Ore hole","Number","Zero"]},

{start:"TREE",end:"WOOD",answers:["FREE","FRET","FRET","FRED","FRED"],clues:["No cost","Guitar ridge","Worry","Male name","Same name"]}

];


/* DAILY PUZZLE ROTATION */

const day = Math.floor(new Date().getTime() / 86400000);
const puzzle = puzzles[day % puzzles.length];

let current=0;
let solved=[];

document.getElementById("goal").textContent=puzzle.start+" → "+puzzle.end;

function draw(){

let ladderHTML="<div class='rung'>"+puzzle.start+"</div>";

for(let i=0;i<puzzle.answers.length;i++){

if(i<solved.length){

ladderHTML+="<div class='rung'>"+solved[i]+"</div>";

}else if(i===current){

ladderHTML+="<div class='rung active'><input id='guess' maxlength='4'></div>";

}else{

ladderHTML+="<div class='rung'><span class='placeholder'>----</span></div>";

}

}

ladderHTML+="<div class='rung'>"+puzzle.end+"</div>";

document.getElementById("ladder").innerHTML=ladderHTML;

let clueHTML="";

for(let i=0;i<puzzle.clues.length;i++){

let c=(i===current)?"clue active":"clue";
clueHTML+="<div class='"+c+"'>"+puzzle.clues[i]+"</div>";

}

document.getElementById("clues").innerHTML=clueHTML;

let input=document.getElementById("guess");

if(input){

input.focus();

input.addEventListener("keydown",function(e){

if(e.key==="Enter") submit();

});

}

}

function submit(){

let input=document.getElementById("guess");

let word=input.value.toUpperCase();

if(word===puzzle.answers[current]){

solved.push(word);

current++;

document.getElementById("message").textContent="";

if(current===puzzle.answers.length){

draw();

document.getElementById("message").textContent="Puzzle solved 🎉";

return;

}

draw();

}else{

document.getElementById("message").textContent="Try again";

}

}

function add(letter){

let g=document.getElementById("guess");

if(g && g.value.length<4) g.value+=letter;

}

function back(){

let g=document.getElementById("guess");

if(g) g.value=g.value.slice(0,-1);

}

function keyboard(){

let k=document.getElementById("keyboard");

let letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";

let html="<div class='keyrow'>";

for(let l of letters){

html+="<button class='key' onclick='add(\""+l+"\")'>"+l+"</button>";

}

html+="<button class='key' onclick='back()'>⌫</button>";

html+="<button class='key wide' onclick='submit()'>ENTER</button>";

html+="</div>";

k.innerHTML=html;

}

keyboard();

draw();

</script>

</body>
</html>
