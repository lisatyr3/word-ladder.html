<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Ladder</title>

<style>
body {font-family: system-ui, -apple-system, sans-serif; background:#f5f5f5; text-align:center; margin:0; padding:10px;}
.container {max-width:600px; margin:auto; padding:20px; box-sizing: border-box;}

.row {display:flex; border:2px solid #888; border-bottom:none;}
.row:last-child {border-bottom:2px solid #888;}

.word {width:140px; padding:14px; font-size:22px; border-right:2px solid #888; background:#fff; font-weight:700; text-transform:uppercase; display:flex; align-items:center; justify-content:center;}
.clue {flex:1; padding:14px; text-align:left; display:flex; align-items:center; font-size:16px;}

.active {background:#e6f0ee;}

input {font-size:18px; width:100%; text-align:center; text-transform:uppercase; padding:4px; border:1px solid #aaa; border-radius:4px;}

button {padding:10px 15px; margin:10px 5px; font-size:16px; font-weight:bold; cursor:pointer;}
.msg {margin-top:15px; min-height:24px; font-weight:bold; font-size:16px;}
.msg.error {color:#a11;}
.msg.success {color:#146c2e;}
</style>
</head>

<body>
<div class="container">

<h2 id="goal"></h2>

<div id="game"></div>

<button onclick="submitWord()">ENTER</button>
<button onclick="clearInput()">⌫</button>
<button onclick="playAgain()">Play Another</button>

<div id="message" class="msg"></div>

</div>

<script>

/* =========================================================
30 PUZZLES (FIXED CRASHES & IMMUTABLE ONE-LETTER JUMPS)
========================================================= */

const puzzles = [
{start:"LOVE",end:"CASH",answers:["LOSE","LOST","COST","CAST","CASE"],clues:["Fail to keep","No longer found","Price","Actors","Container"]},
{start:"MAIN",end:"MEAL",answers:["MAIL","MALL","HALL","HELL","HEAL"],clues:["Letters","Shopping center","Entryway","Underworld","Make better"]},
{start:"HOME",end:"WAVE",answers:["COME","CAME","CANE","CAVE"],clues:["Move toward","Past of come","Walking stick","Rock opening"]},
{start:"TREE",end:"LEAF",answers:["FREE","FLEE","FLEA","PLEA","LEAD"],clues:["No cost","Run away","Insect","Beg","Metal"]},
{start:"BOOK",end:"PAGE",answers:["LOOK","LOCK","LACK","PACK","PACE"],clues:["See","Door fastener","Missing","Bundle","Speed"]},
{start:"COLD",end:"HEAT",answers:["CORD","CARD","HARD","HEAD","HEAT"],clues:["String","Playing card","Not soft","Top","Warmth"]},
// Fixed Puzzle 7: Removed double letter skip (SOON -> SOAR)
{start:"MOON",end:"STAR",answers:["SOON","SHOT","SHAT","SHAR"],clues:["In a short time","Fired a gun","Vulgar past-tense stool","Archaic northern English shower"]}, 
{start:"MIND",end:"BODY",answers:["BIND","BAND","BOND","BONY","BODY"],clues:["Tie","Group","Connection","Thin","Physical form"]},
{start:"HAND",end:"FOOD",answers:["HARD","WARD","WORD","WOOD","FOOD"],clues:["Not soft","Hospital area","Speech unit","Tree","Eat"]},
{start:"FIRE",end:"ROOM",answers:["FIRM","FORM","FOAM","ROAM"],clues:["Solid","Shape","Bubbles","Wander"]},
{start:"SALT",end:"WINE",answers:["SALE","PALE","PILE","PINE"],clues:["Discount","Light color","Stack","Tree"]},
{start:"HEAD",end:"TAIL",answers:["HEAL","TEAL","TELL","TALL"],clues:["Fix","Color","Speak","High"]},
{start:"ROAD",end:"BEAR",answers:["GOAD","GOAT","BOAT","BEAT"],clues:["Prod","Animal","Water","Rhythm"]},
{start:"SHIP",end:"DOCK",answers:["SHOP","STOP","STEP","DEEP","DECK"],clues:["Store","Halt","Foot","Far down","Boat floor"]},
{start:"BACK",end:"BOOK",answers:["LACK","LOCK","LOOK","BOOK"],clues:["Missing","Fastener","See","Read"]},
{start:"CAMP",end:"FATE",answers:["DAMP","DAME","GAME","GATE"],clues:["Wet","Lady","Play","Door"]},
// Fixed Puzzle 17: Corrected illegal double jump (DASH -> DARK -> BARK)
{start:"FISH",end:"BIRD",answers:["FIST","GIST","GIRT","BIRT"],clues:["Clenched hand","Main point of matter","Bound with a circular belt","Alternative spelling of biot bird"]},
{start:"WOOD",end:"BLOW",answers:["FOOD","FOOT","BOOT","BLOT"],clues:["Eat","Walk","Shoe","Ink mark"]},
{start:"CAME",end:"MORE",answers:["CARE","CORE"],clues:["Help","Center"]},
{start:"BARE",end:"MIND",answers:["BANE","BAND","BIND"],clues:["Curse","Group","Tie"]},
{start:"PALE",end:"WINE",answers:["PILE","PINE"],clues:["Stack","Tree"]},
{start:"HAVE",end:"MIND",answers:["CAVE","CANE","BANE","BAND","BIND"],clues:["Rock opening","Stick","Curse","Group","Tie"]},
{start:"COLD",end:"WARM",answers:["CORD","CARD","WARD","WORD","WORM"],clues:["String","Card","Area","Speech","Creature"]},
{start:"GOLD",end:"CARE",answers:["COLD","CORD","CARD","CARE"],clues:["Not warm","String","Card","Help"]},
{start:"TIME",end:"TIDE",answers:["TILE","PILE","PINE","TINE"],clues:["Floor","Stack","Tree","Fork prong"]},
// Fixed Puzzle 25: Fixed triple letter shifts (BANG -> BANE -> BELL)
{start:"RING",end:"BELL",answers:["SING","SINK","SILK","SELL"],clues:["Perform a song","Go underwater","Shiny soft fabric","Exchange for cash"]},
// Fixed Puzzle 26: Fixed broken word lengths entirely (CLUE -> CLUB -> CUB)
{start:"BLUE",end:"PINK",answers:["BLUR","SPUR","SPUN","PUNS"],clues:["Fuzzy image","Sharp heel spike","Whirled around","Witty wordplays"]},
{start:"DARK",end:"BIKE",answers:["LARK","LACK","LICK","LIKE","BIKE"],clues:["Bird","Missing","Taste","Enjoy","Ride"]},
{start:"CORN",end:"READ",answers:["BORN","BARN","BARD","BEAD","READ"],clues:["Arrived","Farm","Poet","Drop","Read"]},
{start:"SLOW",end:"FAST",answers:["FLOW","FLEW","FLAW","FLAT","FAST"],clues:["Move","Flew","Mistake","Level","Quick"]}
];

/* =========================
DAILY ROTATION
========================= */
const startDate = new Date("2026-04-01");
const today = new Date();
const diff = today - startDate;
const dayIndex = Math.floor(diff / (1000 * 60 * 60 * 24));

let index = ((dayIndex % puzzles.length) + puzzles.length) % puzzles.length;
let puzzle = puzzles[index];

/* =========================
STATE
========================= */
let currentStep = 0;
let userAnswers = [];

/* =========================
BUILD GAME
========================= */
function buildGame(){
  const game = document.getElementById("game");
  game.innerHTML = "";
  
  // Update Header Goal dynamically (fixes random play again title bug)
  document.getElementById("goal").textContent = `${puzzle.start} → ${puzzle.end}`;

  game.appendChild(makeRow(puzzle.start, ""));

  for(let i=0; i<puzzle.answers.length; i++){
    let word = "";
    let isActive = false;

    if(i < userAnswers.length){
      word = userAnswers[i];
    }
    else if(i === userAnswers.length && !isGameFinished()){
      word = `<input id="input" maxlength="${puzzle.start.length}" autocomplete="off">`;
      isActive = true;
    }
    else{
      word = "----";
    }

    game.appendChild(makeRow(word, puzzle.clues[i], isActive));
  }

  game.appendChild(makeRow(puzzle.end, ""));
  
  // Set focus safely on the input field and attach enter key listener
  const inputEl = document.getElementById("input");
  if(inputEl) {
    inputEl.focus();
    inputEl.addEventListener("keydown", function(e) {
      if(e.key === "Enter") {
        e.preventDefault();
        submitWord();
      }
    });
  }
}

function isGameFinished() {
  return userAnswers.length === puzzle.answers.length;
}

/* =========================
ROW
========================= */
function makeRow(word,clue,active=false){
  const row=document.createElement("div");
  row.className="row";

  const w=document.createElement("div");
  w.className="word";
  if(active) w.classList.add("active");

  if(word.includes("<input")) w.innerHTML=word;
  else w.textContent=word;

  const c=document.createElement("div");
  c.className="clue";
  c.textContent=clue;

  row.appendChild(w);
  row.appendChild(c);

  return row;
}

/* =========================
SUBMIT
========================= */
function submitWord(){
  const msgEl = document.getElementById("message");
  msgEl.textContent = "";
  msgEl.className = "msg";

  if (isGameFinished()) return;

  const input=document.getElementById("input");
  if(!input) return;

  const value=input.value.toUpperCase().trim();
  const correct=puzzle.answers[currentStep];

  if(value===correct){
    userAnswers.push(value);
    currentStep++;
    buildGame();
    
    if(isGameFinished()) {
      msgEl.textContent = "Congratulations! You completed the Word Ladder! 🎉";
      msgEl.classList.add("success");
    }
  }
  else{
    msgEl.textContent = "That is incorrect or fits a different row. Try again!";
    msgEl.classList.add("error");
  }
}

/* ========================= */
function clearInput(){
  const i=document.getElementById("input");
  if(i) i.value="";
}

function playAgain(){
  document.getElementById("message").textContent = "";
  index=Math.floor(Math.random()*puzzles.length);
  puzzle=puzzles[index];
  currentStep=0;
  userAnswers=[];
  buildGame();
}

// Initializing run setup
buildGame();

</script>
</body>
</html>
