<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Ladder Challenge</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f6f7;
display:flex;
justify-content:center;
padding:20px;
}

.container{
background:white;
padding:25px;
max-width:820px;
width:100%;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-top:0;
color:#2a7b6f;
}

.goal{
text-align:center;
font-size:26px;
margin-bottom:10px;
}

.instructions{
text-align:center;
margin-bottom:25px;
color:#666;
}

.game{
display:flex;
gap:40px;
align-items:flex-start;
}

.ladder{
border-left:6px solid #666;
border-right:6px solid #666;
}

.rung{
border-top:6px solid #666;
padding:16px 40px;
font-size:24px;
text-align:center;
width:160px;
}

.rung:last-child{
border-bottom:6px solid #666;
}

.active{
background:#e7f1ef;
}

.clues{
flex:1;
}

.clue{
height:60px;
display:flex;
align-items:center;
border-bottom:1px solid #eee;
}

input{
font-size:22px;
text-align:center;
width:120px;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.keyboard{
margin-top:25px;
text-align:center;
}

.key{
display:inline-block;
padding:10px 14px;
margin:4px;
background:#ddd;
border-radius:6px;
cursor:pointer;
}

.key:hover{
background:#ccc;
}

.message{
text-align:center;
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Word Ladder Challenge</h1>

<div class="goal">
MAIN → MEAL
</div>

<div class="instructions">
Fill in the missing words. Each step must change <b>one letter</b>.
</div>

<div class="game">

<div class="ladder" id="ladder"></div>

<div class="clues" id="clues"></div>

</div>

<div class="keyboard" id="keyboard"></div>

<div class="message" id="message"></div>

</div>

<script>

const puzzle={
words:["MAIN","MAIL","MALL","HALL","HELL","HEAL","MEAL"],
clues:[
"",
"Postal system",
"Shopping center",
"Entryway",
"Underworld",
"Cure"
]
}

let current=1

function draw(){

let ladderHTML=""
let clueHTML=""

puzzle.words.forEach((word,i)=>{

if(i===0 || i===puzzle.words.length-1){

ladderHTML+=`<div class="rung">${word}</div>`

}else if(i<current){

ladderHTML+=`<div class="rung">${puzzle.words[i]}</div>`

}else if(i===current){

ladderHTML+=`<div class="rung active"><input id="guess" maxlength="4"></div>`

}else{

ladderHTML+=`<div class="rung">----</div>`

}

if(i>0 && i<puzzle.words.length){

clueHTML+=`<div class="clue">${puzzle.clues[i]}</div>`

}

})

document.getElementById("ladder").innerHTML=ladderHTML
document.getElementById("clues").innerHTML=clueHTML

}

function addLetter(letter){

let input=document.getElementById("guess")
if(!input) return

if(input.value.length<4){
input.value+=letter
}

}

function deleteLetter(){

let input=document.getElementById("guess")
if(!input) return

input.value=input.value.slice(0,-1)

}

function submitWord(){

let input=document.getElementById("guess")
if(!input) return

let word=input.value.toUpperCase()

if(word===puzzle.words[current]){

current++
document.getElementById("message").innerText=""

draw()

if(current===puzzle.words.length-1){

document.getElementById("message").innerText="Puzzle solved 🎉"

}

}else{

document.getElementById("message").innerText="Not quite. Try again."

}

}

function createKeyboard(){

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ"

let html=""

for(let l of letters){
html+=`<div class="key" onclick="addLetter('${l}')">${l}</div>`
}

html+=`<div class="key" onclick="deleteLetter()">⌫</div>`
html+=`<div class="key" onclick="submitWord()">ENTER</div>`

document.getElementById("keyboard").innerHTML=html

}

draw()
createKeyboard()

</script>

</body>
</html>
