<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Ladder Challenge</title>

<style>
body{
font-family:Arial,Helvetica,sans-serif;
background:#f3f4f4;
margin:0;
padding:16px;
}

.wrap{
max-width:1000px;
margin:auto;
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

h1{text-align:center;color:#2d8a78;}

.goal{text-align:center;font-size:28px;font-weight:bold;margin:10px 0;}

.instructions{text-align:center;color:#666;margin-bottom:20px;}

.stats{text-align:center;margin-bottom:10px;}

.game{
display:grid;
grid-template-columns:300px 1fr;
gap:30px;
}

.ladder{
border-left:5px solid #777;
border-right:5px solid #777;
}

.rung{
min-height:70px;
border-top:5px solid #777;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
}

.rung:last-child{border-bottom:5px solid #777;}

.active{background:#e5f0ee;}

input{
font-size:24px;
text-align:center;
width:120px;
padding:6px;
border-radius:8px;
border:1px solid #ccc;
}

.clueSpacer{min-height:70px;}

.clue{
min-height:70px;
display:flex;
align-items:center;
border-top:1px solid #eee;
font-size:18px;
}

.clue.active{font-weight:bold;color:#2d8a78;}

.keyboard{text-align:center;margin-top:15px;}

.key{
display:inline-block;
padding:10px;
margin:3px;
background:#ddd;
border-radius:6px;
cursor:pointer;
}

.buttons{text-align:center;margin-top:10px;}

button{
padding:10px 16px;
margin:5px;
border:none;
border-radius:8px;
background:#2d8a78;
color:white;
font-size:16px;
cursor:pointer;
}

.message{
text-align:center;
font-size:20px;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>Word Ladder Challenge</h1>

<div class="goal" id="goal"></div>

<div class="instructions">
Change one letter at a time to reach the final word.
</div>

<div class="stats">
⏱ Time: <span id="timer">0</span>s |
🔥 Streak: <span id="streak">0</span>
</div>

<div class="game">

<div class="ladder" id="ladder"></div>

<div>
<div class="clueSpacer"></div>
<div id="clues"></div>
</div>

</div>

<div class="keyboard" id="keyboard"></div>

<div class="buttons">
<button onclick="giveHint()">Hint</button>
</div>

<div class="message" id="message"></div>

</div>

<script>

/* CLEAN VALIDATED PUZZLES */

const puzzles=[
{start:"MAIN",end:"MEAL",answers:["MAIL","MALL","HALL","HELL","HEAL"],clues:["Postal system","Shopping center","Entryway","Underworld","Cure"]},
{start:"COLD",end:"WARM",answers:["CORD","WORD","WARD","WARM","WORM"],clues:["Rope","Speech","Hospital","Opposite cold","Wiggly creature"]},
{start:"SAND",end:"ROCK",answers:["SEND","SEED","REED","RECK","ROCK"],clues:["Mail","Seed","Grass","Care","Stone"]},
{start:"TIME",end:"TIDE",answers:["TILE","PILE","PINE","TINE","TIDE"],clues:["Floor","Stack","Tree","Fork part","Ocean"]},
{start:"FISH",end:"BIRD",answers:["DISH","DASH","DARK","BARK","BIRD"],clues:["Plate","Run","No light","Dog sound","Flying animal"]},
{start:"HOME",end:"AWAY",answers:["COME","CAME","CANE","CAVE","WAVE"],clues:["Arrive","Past","Stick","Cave","Ocean"]},
{start:"TREE",end:"LEAF",answers:["FREE","FLEE","FLEA","PLEA","LEAD"],clues:["No cost","Run","Insect","Beg","Metal"]},
{start:"ROAD",end:"BEAR",answers:["GOAD","GOAT","BOAT","BEAT","BEAN"],clues:["Prod","Animal","Boat","Rhythm","Food"]},
{start:"FIRE",end:"SNOW",answers:["FIRM","FORM","FOAM","ROAM","ROOM"],clues:["Solid","Shape","Bubbles","Wander","Room"]},
{start:"LOVE",end:"CASH",answers:["LOSE","LOST","COST","CAST","CASE"],clues:["Misplace","Gone","Price","Actors","Box"]},
{start:"MILK",end:"SALE",answers:["MILD","MILE","TILE","TALE","PALE"],clues:["Gentle","Distance","Floor","Story","Light color"]},
{start:"BACK",end:"ROOM",answers:["LACK","LOCK","LOOK","BOOK","BOOM"],clues:["Not enough","Secure","See","Read","Bang"]},
{start:"WOOD",end:"BLEW",answers:["FOOD","FOOT","BOOT","BLOT","BLOW"],clues:["Eat","Foot","Shoe","Ink mark","Air"]},
{start:"MOON",end:"BLOW",answers:["NOON","SOON","SOOT","BOOT","BLOT"],clues:["Midday","Soon","Ash","Shoe","Ink"]},
{start:"HEAD",end:"BEAN",answers:["HEAL","HELL","BELL","BELT","BEAT"],clues:["Cure","Underworld","Ring","Waist","Rhythm"]},
{start:"CAMP",end:"KIND",answers:["CAME","CANE","BANE","BAND","BIND"],clues:["Arrived","Stick","Curse","Music","Tie"]},
{start:"BEAN",end:"HEAL",answers:["BEAR","BEAT","BELT","BELL","HELL"],clues:["Animal","Rhythm","Waist","Ring","Underworld"]},
{start:"GOLD",end:"CAVE",answers:["COLD","CORD","CARD","CARE","CAME"],clues:["Not warm","Rope","Card","Care","Arrived"]},
{start:"MINT",end:"BORE",answers:["MIND","BIND","BAND","BANE","BARE"],clues:["Brain","Tie","Music","Curse","No clothes"]},
{start:"FIRE",end:"WAGE",answers:["TIRE","TARE","TALE","SALE","SAGE"],clues:["Tired","Weight","Story","Discount","Wise"]},
{start:"ROAD",end:"CORN",answers:["LOAD","LEAD","LEAK","PEAK","PEAR"],clues:["Carry","Guide","Drip","Top","Fruit"]},
{start:"FARM",end:"CARE",answers:["FIRM","FIRE","TIRE","TARE","BARE"],clues:["Solid","Flame","Tired","Weight","No clothes"]},
{start:"LOVE",end:"GOAT",answers:["LOSE","LOST","COST","COAT","BOAT"],clues:["Misplace","Gone","Price","Jacket","Boat"]},
{start:"WIND",end:"BORN",answers:["BIND","BAND","BANE","BARE","BORE"],clues:["Tie","Music","Curse","No clothes","Hole"]},
{start:"TREE",end:"BLED",answers:["FREE","FLEE","FLEA","PLEA","PLED"],clues:["Free","Run","Insect","Beg","Promised"]},
{start:"CAMP",end:"FIRE",answers:["DAMP","DAME","GAME","GATE","FATE"],clues:["Wet","Lady","Play","Door","Destiny"]},
{start:"SALT",end:"SWEET",answers:["SALE","PALE","PILE","PINE","WINE"],clues:["Store event","Light color","Stack","Tree","Drink"]},
{start:"SHIP",end:"PORT",answers:["SHOP","STOP","STEP","SEEP","KEEP"],clues:["Store","Halt","Step","Leak","Hold"]}
];

/* DAILY */

let index=Math.floor(Date.now()/86400000)%puzzles.length;
let puzzle=puzzles[index];

/* STATE */

let current=0;
let solved=[];
let seconds=0;

/* TIMER */
setInterval(()=>{
seconds++;
document.getElementById("timer").textContent=seconds;
},1000);

/* STREAK */
let streak=localStorage.getItem("streak")||0;
document.getElementById("streak").textContent=streak;

/* DRAW */

function draw(){

document.getElementById("goal").textContent=puzzle.start+" → "+puzzle.end;

let html="<div class='rung'>"+puzzle.start+"</div>";

for(let i=0;i<puzzle.answers.length;i++){
if(i<solved.length){
html+="<div class='rung'>"+solved[i]+"</div>";
}
else if(i===current){
html+="<div class='rung active'><input id='guess'></div>";
}
else{
html+="<div class='rung'>----</div>";
}
}

html+="<div class='rung'>"+puzzle.end+"</div>";

document.getElementById("ladder").innerHTML=html;

let clues="";
for(let i=0;i<puzzle.clues.length;i++){
let c=(i===current)?"clue active":"clue";
clues+="<div class='"+c+"'>"+puzzle.clues[i]+"</div>";
}
document.getElementById("clues").innerHTML=clues;

let g=document.getElementById("guess");
if(g){
g.focus();
g.addEventListener("keydown",e=>{
if(e.key==="Enter") submit();
});
}
}

/* SUBMIT */

function submit(){

let g=document.getElementById("guess");
let word=g.value.toUpperCase();

if(word===puzzle.answers[current]){

solved.push(word);
current++;

if(current===puzzle.answers.length){

streak++;
localStorage.setItem("streak",streak);
document.getElementById("streak").textContent=streak;

document.getElementById("message").innerHTML=`
🎉 You solved it!<br><br>
<button onclick="nextPuzzle()">Play Another Puzzle</button>
`;

return;
}

draw();

}else{
document.getElementById("message").textContent="Try again";
}

}

/* NEXT PUZZLE */

function nextPuzzle(){

index=Math.floor(Math.random()*puzzles.length);
puzzle=puzzles[index];

current=0;
solved=[];
seconds=0;

document.getElementById("message").textContent="";

draw();
}

/* HINT */

function giveHint(){
let word=puzzle.answers[current];
document.getElementById("message").textContent="Starts with: "+word[0];
}

/* KEYBOARD */

function keyboard(){
let letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let html="";
for(let l of letters){
html+="<span class='key' onclick='add(\""+l+"\")'>"+l+"</span>";
}
html+="<span class='key' onclick='back()'>⌫</span>";
html+="<span class='key' onclick='submit()'>ENTER</span>";
document.getElementById("keyboard").innerHTML=html;
}

function add(l){
let g=document.getElementById("guess");
if(g && g.value.length<4) g.value+=l;
}

function back(){
let g=document.getElementById("guess");
if(g) g.value=g.value.slice(0,-1);
}

keyboard();
draw();

</script>

</body>
</html>
