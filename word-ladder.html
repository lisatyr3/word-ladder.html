<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Word Ladder Challenge</title>

<style>

body{
font-family:Arial,Helvetica,sans-serif;
background:#f5f6f7;
padding:20px;
display:flex;
justify-content:center;
}

.container{
background:white;
padding:25px;
max-width:750px;
width:100%;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-top:0;
color:#2a7b6f;
}

.instructions{
text-align:center;
color:#666;
margin-bottom:20px;
}

.game{
display:flex;
gap:40px;
}

.ladder{
border-left:6px solid #666;
border-right:6px solid #666;
padding:10px 0;
}

.rung{
border-top:6px solid #666;
padding:14px 30px;
font-size:24px;
text-align:center;
}

.active{
background:#e8f3f1;
font-weight:bold;
}

.clues{
flex:1;
}

.clue{
padding:14px 0;
border-bottom:1px solid #eee;
}

input{
font-size:22px;
text-align:center;
width:120px;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.keyboard{
margin-top:20px;
text-align:center;
}

.key{
display:inline-block;
padding:10px 14px;
margin:4px;
background:#ddd;
border-radius:6px;
cursor:pointer;
}

.key:hover{
background:#ccc;
}

.message{
text-align:center;
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Word Ladder Challenge</h1>

<div class="instructions">
Change <b>one letter</b> at a time using the clues.
</div>

<div class="game">

<div class="ladder" id="ladder"></div>

<div class="clues" id="clues"></div>

</div>

<div class="keyboard" id="keyboard"></div>

<div class="message" id="message"></div>

</div>

<script>

const puzzle = {
words:["MAIN","MAIL","MALL","HALL","HELL","HEAL","MEAL"],
clues:[
"",
"Postal system",
"Shopping center",
"Entryway",
"Underworld",
"Cure",
"Food"
]
}

let current=1
let guess=""

function draw(){

let ladderHTML=""
let clueHTML=""

puzzle.words.forEach((word,i)=>{

if(i==0 || i==puzzle.words.length-1){

ladderHTML+=`<div class="rung">${word}</div>`

}else{

if(i===current){

ladderHTML+=`<div class="rung active">
<input id="guess" maxlength="4">
</div>`

}else{

ladderHTML+=`<div class="rung">----</div>`

}

}

clueHTML+=`<div class="clue">${puzzle.clues[i]}</div>`

})

document.getElementById("ladder").innerHTML=ladderHTML
document.getElementById("clues").innerHTML=clueHTML

}

function addLetter(letter){

let input=document.getElementById("guess")

if(!input) return

if(input.value.length<4){

input.value+=letter

}

}

function deleteLetter(){

let input=document.getElementById("guess")

input.value=input.value.slice(0,-1)

}

function submitWord(){

let input=document.getElementById("guess")

let word=input.value.toUpperCase()

if(word===puzzle.words[current]){

current++

if(current===puzzle.words.length-1){

document.getElementById("message").innerText="Great job! You solved it 🎉"

}

draw()

}else{

document.getElementById("message").innerText="Try again"

}

}

function createKeyboard(){

const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ"

let html=""

for(let l of letters){

html+=`<div class="key" onclick="addLetter('${l}')">${l}</div>`

}

html+=`<div class="key" onclick="deleteLetter()">⌫</div>`
html+=`<div class="key" onclick="submitWord()">ENTER</div>`

document.getElementById("keyboard").innerHTML=html

}

draw()
createKeyboard()

</script>

</body>
</html>
