<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today's Word Ladder</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f5f7f6;
margin:0;
padding:20px;
display:flex;
justify-content:center;
}

.container{
background:white;
max-width:650px;
width:100%;
padding:25px;
border-radius:12px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-top:0;
color:#2a7b6f;
}

.instructions{
text-align:center;
color:#555;
margin-bottom:20px;
}

.gamebox{
background:#f8f8f8;
padding:20px;
border-radius:10px;
}

.words{
font-size:26px;
text-align:center;
margin-bottom:10px;
}

.steps{
text-align:center;
font-size:20px;
letter-spacing:2px;
margin-bottom:20px;
}

input{
font-size:20px;
padding:10px;
width:150px;
text-align:center;
border-radius:8px;
border:1px solid #ccc;
}

button{
font-size:16px;
padding:10px 16px;
margin-left:10px;
border-radius:8px;
border:none;
background:#2a7b6f;
color:white;
cursor:pointer;
}

button:hover{
background:#23665b;
}

.buttons{
text-align:center;
margin-top:15px;
}

.message{
text-align:center;
margin-top:15px;
font-size:18px;
font-weight:bold;
}

.hint{
margin-top:10px;
text-align:center;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>Today's Word Ladder</h1>

<div class="instructions">
Change one letter at a time to turn the first word into the last word.
</div>

<div class="gamebox">

<div class="words">
<strong id="start"></strong>
→
<strong id="end"></strong>
</div>

<div class="steps" id="ladder"></div>

<div style="text-align:center">

<input id="guess" maxlength="4" placeholder="WORD">

<button onclick="addWord()">Add</button>

</div>

<div class="buttons">

<button onclick="showHint()">Hint</button>

<button onclick="resetGame()">Restart</button>

</div>

<div class="message" id="message"></div>

<div class="hint" id="hint"></div>

</div>

</div>

<script>

const puzzles=[
{
start:"COLD",
end:"WARM",
solution:["CORD","CARD","WARD"]
},

{
start:"MILK",
end:"MEAL",
solution:["SILK","SEAL","MEAL"]
},

{
start:"TIME",
end:"TIDE",
solution:["TILE","TILE","TIDE"]
},

{
start:"SHIP",
end:"BOAT",
solution:["SHOP","SOUP","SOAP"]
}

]

let puzzle=puzzles[Math.floor(Math.random()*puzzles.length)]

let ladder=[puzzle.start]

function draw(){

let html=""

ladder.forEach(w=>{

html+=w+"<br>"

})

document.getElementById("ladder").innerHTML=html

}

function addWord(){

let word=document.getElementById("guess").value.toUpperCase()

document.getElementById("guess").value=""

if(word.length!==4){

showMessage("Use a 4-letter word")

return

}

let last=ladder[ladder.length-1]

let diff=0

for(let i=0;i<4;i++){

if(last[i]!==word[i]) diff++

}

if(diff!==1){

showMessage("Change only one letter")

return

}

ladder.push(word)

draw()

if(word===puzzle.end){

showMessage("Great job! You solved it 🎉")

}

}

function showHint(){

document.getElementById("hint").innerText=
"Try changing the first or second letter."

}

function resetGame(){

ladder=[puzzle.start]

draw()

document.getElementById("message").innerText=""

}

function showMessage(msg){

document.getElementById("message").innerText=msg

}

document.getElementById("start").innerText=puzzle.start
document.getElementById("end").innerText=puzzle.end

draw()

</script>

</body>
</html>
