<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Ladder</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f5f5f5;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    margin-bottom: 5px;
}

.subtitle {
    color: #666;
    margin-bottom: 15px;
}

.stats {
    margin-bottom: 20px;
}

.game {
    display: flex;
    gap: 20px;
    justify-content: center;
}

.ladder {
    border: 4px solid #888;
    width: 220px;
}

.step {
    border-bottom: 2px solid #888;
    padding: 15px;
    font-size: 24px;
    background: #fff;
}

.step.active {
    background: #e6f0ee;
}

.clues {
    text-align: left;
}

.clue {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

input {
    font-size: 20px;
    padding: 5px;
    width: 120px;
    text-align: center;
}

.keyboard {
    margin-top: 20px;
}

button {
    padding: 10px 15px;
    margin: 5px;
    font-size: 16px;
    cursor: pointer;
}

.success {
    color: green;
    font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

<h1 id="goal"></h1>
<div class="subtitle">Change one letter at a time to reach the final word</div>

<div class="stats">
⏱ Time: <span id="time">0</span>s |
🔥 Streak: <span id="streak">0</span>
</div>

<div class="game">

<div class="ladder" id="ladder"></div>

<div class="clues" id="clues"></div>

</div>

<div class="keyboard">
<button onclick="submitWord()">ENTER</button>
<button onclick="clearInput()">⌫</button>
</div>

<div id="message"></div>

<button onclick="playAgain()">Play Again</button>

</div>

<script>

/* =========================
PUZZLES
========================= */

const puzzles = [

{
start:"BOOK", end:"PAGE",
answers:["LOOK","LOCK","LACK","PACK","PACE"],
clues:[
"See with eyes",
"Door fastener",
"Missing",
"Bundle up",
"Speed"
]
},

{
start:"SHIP", end:"DOCK",
answers:["SHOP","STOP","STEP","DEEP","DECK"],
clues:[
"Store",
"Halt",
"Foot movement",
"Very far down",
"Boat floor"
]
},

{
start:"COLD", end:"HEAT",
answers:["CORD","CARD","HARD","HEAD","HEAT"],
clues:[
"Thick string",
"Playing card",
"Not soft",
"Top part",
"High temperature"
]
},

{
start:"MOON", end:"STAR",
answers:["SOON","SOAR","SCAR","STAR"],
clues:[
"In a little while",
"Fly high",
"Mark on skin",
"Night light"
]
},

{
start:"MIND", end:"BODY",
answers:["BIND","BAND","BOND","BONY","BODY"],
clues:[
"Tie up",
"Group",
"Connection",
"Thin frame",
"Physical form"
]
}

];


/* =========================
DAILY ROTATION
========================= */

const startDate = new Date("2026-04-01");
const today = new Date();
const diff = today - startDate;
const dayIndex = Math.floor(diff / (1000 * 60 * 60 * 24));
let index = dayIndex % puzzles.length;

let puzzle = puzzles[index];


/* =========================
STATE
========================= */

let currentStep = 0;
let userAnswers = [];
let time = 0;
let timer;
let streak = localStorage.getItem("streak") || 0;


/* =========================
INIT
========================= */

function initGame() {

document.getElementById("goal").textContent =
`Puzzle #${dayIndex + 1}: ${puzzle.start} → ${puzzle.end}`;

document.getElementById("streak").textContent = streak;

buildLadder();
buildClues();

startTimer();

}

function buildLadder() {
const ladder = document.getElementById("ladder");
ladder.innerHTML = "";

const words = [puzzle.start, ...puzzle.answers];

words.forEach((word, i) => {
    const div = document.createElement("div");
    div.className = "step";
    if (i === currentStep + 1) div.classList.add("active");

    if (i === 0 || i > userAnswers.length) {
        div.textContent = word;
    }

    if (i > 0 && i <= userAnswers.length) {
        div.textContent = userAnswers[i - 1];
    }

    if (i === currentStep + 1) {
        div.innerHTML = `<input id="input" maxlength="${puzzle.start.length}" />`;
    }

    ladder.appendChild(div);
});
}

function buildClues() {
const cluesDiv = document.getElementById("clues");
cluesDiv.innerHTML = "";

puzzle.clues.forEach(c => {
    const div = document.createElement("div");
    div.className = "clue";
    div.textContent = c;
    cluesDiv.appendChild(div);
});
}

function submitWord() {

const input = document.getElementById("input");
if (!input) return;

const value = input.value.toUpperCase();

const correct = puzzle.answers[currentStep];

if (value === correct) {

    userAnswers.push(value);
    currentStep++;

    if (currentStep === puzzle.answers.length) {
        winGame();
    }

    buildLadder();

} else {
    document.getElementById("message").textContent = "Try again";
}

}

function clearInput() {
const input = document.getElementById("input");
if (input) input.value = "";
}

function winGame() {

clearInterval(timer);

streak++;
localStorage.setItem("streak", streak);

document.getElementById("message").innerHTML =
"<div class='success'>✔ You got it!</div>";

}

function startTimer() {
timer = setInterval(() => {
    time++;
    document.getElementById("time").textContent = time;
}, 1000);
}

function playAgain() {

index = Math.floor(Math.random() * puzzles.length);
puzzle = puzzles[index];

currentStep = 0;
userAnswers = [];
time = 0;

clearInterval(timer);

initGame();

}

initGame();

</script>

</body>
</html>
